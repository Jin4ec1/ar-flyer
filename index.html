<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>状況応答型ARポスター (アスペクト比・自動再生修正版)</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body { margin: 0; overflow: hidden; touch-action: none; }

    /* 操作パネル */
    #control-panel {
      position: fixed;
      bottom: 30px;
      left: 0;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      z-index: 9999;
      pointer-events: none;
      padding: 0 20px;
      box-sizing: border-box;
    }

    .btn-group {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    .volume-group {
      pointer-events: auto;
      background: rgba(0, 0, 0, 0.6);
      padding: 10px 20px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: white;
      font-size: 14px;
      font-weight: bold;
      backdrop-filter: blur(5px);
    }

    .volume-group input[type="range"] {
      width: 120px;
    }

    .mode-btn {
      pointer-events: auto;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: bold;
      color: white;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      background-color: #555;
      touch-action: manipulation;
      transition: transform 0.1s, background-color 0.2s;
    }
    
    .mode-btn:active { transform: scale(0.95); }

    #btn-live { background-color: #ff4757; }
    #btn-visual { background-color: #2f3542; }
    #btn-anim[data-state="on"] { background-color: #e91e63; }
    #btn-anim[data-state="off"] { background-color: #7f8c8d; opacity: 0.8; }

    #start-guide {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      z-index: 10000;
      pointer-events: none;
      transition: opacity 0.5s;
    }
  </style>
</head>
<body>

  <div id="start-guide">画面をタップして<br>ARをスタート</div>

  <div id="control-panel">
    <div class="volume-group">
      <label for="volume-slider">🔈 音量:</label>
      <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="1">
    </div>

    <div class="btn-group">
      <button id="btn-live" class="mode-btn">🔴 Live Mode(動画)</button>
      <button id="btn-visual" class="mode-btn">🖼️ Visual Mode(画像)</button>
      <button id="btn-anim" class="mode-btn" data-state="off">⚪️ 演出: OFF</button>
    </div>
  </div>

  <a-scene 
    mindar-image="imageTargetSrc: ./assets/targets.mind; uiScanning: yes; missTolerance: 1;" 
    color-space="sRGB" 
    renderer="colorManagement: true, physicallyCorrectLights" 
    vr-mode-ui="enabled: false" 
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <video id="video-1" src="./assets/video-day1.mp4" preload="auto" loop="true" playsinline webkit-playsinline muted crossorigin="anonymous"></video>
      <img id="image-1" src="./assets/image-night1.jpeg" crossorigin="anonymous" />

      <video id="video-2" src="./assets/video-day2.mp4" preload="auto" loop="true" playsinline webkit-playsinline muted crossorigin="anonymous"></video>
      <img id="image-2" src="./assets/image-night2.jpeg" crossorigin="anonymous" />

      <video id="video-3" src="./assets/video-day3.mp4" preload="auto" loop="true" playsinline webkit-playsinline muted crossorigin="anonymous"></video>
      <img id="image-3" src="./assets/image-night3.jpeg" crossorigin="anonymous" />
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false" wasd-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0" class="ar-target" data-video="video-1" data-image="image-1">
      <a-video class="ar-screen-video" src="#video-1" position="0 0 0" visible="false" material="transparent: true"></a-video>
      <a-image class="ar-screen-image" src="#image-1" position="0 0 0" visible="false" material="transparent: true"></a-image>
    </a-entity>

    <a-entity mindar-image-target="targetIndex: 1" class="ar-target" data-video="video-2" data-image="image-2">
      <a-video class="ar-screen-video" src="#video-2" position="0 0 0" visible="false" material="transparent: true"></a-video>
      <a-image class="ar-screen-image" src="#image-2" position="0 0 0" visible="false" material="transparent: true"></a-image>
    </a-entity>

    <a-entity mindar-image-target="targetIndex: 2" class="ar-target" data-video="video-3" data-image="image-3">
      <a-video class="ar-screen-video" src="#video-3" position="0 0 0" visible="false" material="transparent: true"></a-video>
      <a-image class="ar-screen-image" src="#image-3" position="0 0 0" visible="false" material="transparent: true"></a-image>
    </a-entity>

  </a-scene>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const ANIMATION_PATTERNS = [
        { name: "Pop", reset: { scale: '0.01 0.01 0.01', position: '0 0 0', rotation: '0 0 0' }, attrs: { 'animation': 'property: scale; from: 0.01 0.01 0.01; to: 1 1 1; dur: 800; easing: easeOutElastic; startEvents: play-anim' } },
        { name: "Spin", reset: { scale: '0 0 0', position: '0 0 0', rotation: '0 0 -180' }, attrs: { 'animation': 'property: rotation; from: 0 0 -180; to: 0 0 0; dur: 1000; easing: easeOutBack; startEvents: play-anim', 'animation__scale': 'property: scale; from: 0 0 0; to: 1 1 1; dur: 1000; easing: easeOutBack; startEvents: play-anim' } },
        { name: "Curtain", reset: { scale: '1 0 1', position: '0 0 0', rotation: '0 0 0' }, attrs: { 'animation': 'property: scale; from: 1 0 1; to: 1 1 1; dur: 800; easing: easeOutExpo; startEvents: play-anim' } }
      ];

      let currentMode = 'live'; 
      let isUnlocked = false;
      let isAnimEnabled = false;
      let activeTarget = null; 

      const guideEl = document.getElementById('start-guide');
      const btnLive = document.getElementById('btn-live');
      const btnVisual = document.getElementById('btn-visual');
      const btnAnim = document.getElementById('btn-anim');
      const volumeSlider = document.getElementById('volume-slider');

      const allTargets = document.querySelectorAll('.ar-target');
      const allVideos = document.querySelectorAll('video');

      // 音量調整
      volumeSlider.addEventListener('input', (e) => {
        const volumeValue = parseFloat(e.target.value);
        allVideos.forEach(video => {
          video.volume = volumeValue;
        });
      });

      // アニメーション再生処理
      const playRandomAnimation = (screenEl) => {
        if (!screenEl) return;
        const oldAttrs = ['animation', 'animation__scale'];
        oldAttrs.forEach(attr => screenEl.removeAttribute(attr));

        if (!isAnimEnabled) {
          screenEl.setAttribute('scale', '1 1 1');
          screenEl.setAttribute('position', '0 0 0');
          screenEl.setAttribute('rotation', '0 0 0');
          return;
        }

        const pattern = ANIMATION_PATTERNS[Math.floor(Math.random() * ANIMATION_PATTERNS.length)];
        if (pattern.reset) {
          Object.keys(pattern.reset).forEach(key => screenEl.setAttribute(key, pattern.reset[key]));
        }
        Object.keys(pattern.attrs).forEach(key => screenEl.setAttribute(key, pattern.attrs[key]));
        setTimeout(() => screenEl.emit('play-anim'), 50);
      };

      // サイズ（アスペクト比）の動的調整
      const adjustSize = (asset, plane) => {
        let w, h;
        if (asset.tagName === 'VIDEO') {
          w = asset.videoWidth;
          h = asset.videoHeight;
        } else {
          w = asset.naturalWidth;
          h = asset.naturalHeight;
        }
        
        if (w > 0 && h > 0) {
          plane.setAttribute('width', '1');
          plane.setAttribute('height', (h / w).toString());
        }
      };

      // コンテンツの更新処理
      const updateContent = (triggerAnim = true) => {
        allVideos.forEach(el => el.pause());

        if (!activeTarget) return;

        const videoPlane = activeTarget.querySelector('.ar-screen-video');
        const imagePlane = activeTarget.querySelector('.ar-screen-image');
        
        const videoId = activeTarget.getAttribute('data-video');
        const imageId = activeTarget.getAttribute('data-image');
        
        const videoAsset = document.getElementById(videoId);
        const imageAsset = document.getElementById(imageId);

        [videoPlane, imagePlane].forEach(plane => {
          plane.setAttribute('visible', 'false');
          plane.removeAttribute('animation');
          plane.removeAttribute('animation__scale');
          plane.setAttribute('scale', '1 1 1');
        });

        const isLive = currentMode === 'live';
        const activePlane = isLive ? videoPlane : imagePlane;
        const activeAsset = isLive ? videoAsset : imageAsset;

        activePlane.setAttribute('visible', 'true');

        allVideos.forEach(el => {
          if (el !== activeAsset) el.currentTime = 0;
        });

        if (activeAsset.tagName === 'VIDEO') {
          if (activeAsset.readyState >= 2) { 
            adjustSize(activeAsset, activePlane);
          } else {
            activeAsset.addEventListener('loadeddata', () => adjustSize(activeAsset, activePlane), { once: true });
            activeAsset.load(); 
          }
        } else {
          if (activeAsset.complete) {
            adjustSize(activeAsset, activePlane);
          } else {
            activeAsset.onload = () => adjustSize(activeAsset, activePlane);
          }
        }

        if (triggerAnim) playRandomAnimation(activePlane);

        // ★修正ポイント：厳密すぎる visible 判定を外し、ロック解除されていれば再生する
        if (isLive && isUnlocked) {
          activeAsset.muted = false;
          activeAsset.volume = parseFloat(volumeSlider.value);
          activeAsset.play().catch(e => console.warn("動画再生エラー:", e));
        }
      };

      btnLive.addEventListener('click', (e) => {
        e.stopPropagation();
        currentMode = 'live';
        updateContent(true);
      });

      btnVisual.addEventListener('click', (e) => {
        e.stopPropagation();
        currentMode = 'visual';
        updateContent(true);
      });

      btnAnim.addEventListener('click', (e) => {
        e.stopPropagation();
        isAnimEnabled = !isAnimEnabled;
        btnAnim.textContent = isAnimEnabled ? "✨ 演出: ON" : "⚪️ 演出: OFF";
        btnAnim.setAttribute('data-state', isAnimEnabled ? 'on' : 'off');
        
        if (activeTarget) {
          const isLive = currentMode === 'live';
          const activePlane = activeTarget.querySelector(isLive ? '.ar-screen-video' : '.ar-screen-image');
          playRandomAnimation(activePlane);

          // ★ここも同様に厳密すぎる判定を外しました
          if (isLive && isUnlocked) {
            const videoId = activeTarget.getAttribute('data-video');
            const videoAsset = document.getElementById(videoId);
            if (videoAsset) {
              videoAsset.play().catch(e => console.log(e));
            }
          }
        }
      });

      const unlockAudio = () => {
        if (isUnlocked) return;
        isUnlocked = true;
        
        allVideos.forEach(el => {
          el.muted = false; 
          const playPromise = el.play();
          if (playPromise !== undefined) {
             playPromise.then(() => {
               el.pause();
               el.currentTime = 0;
             }).catch(e => console.warn("Unlock Error:", e));
          }
        });

        guideEl.style.opacity = '0';
        setTimeout(() => guideEl.style.display = 'none', 500);
        updateContent(true); 
      };

      document.body.addEventListener('click', unlockAudio, { once: true });
      document.body.addEventListener('touchstart', unlockAudio, { once: true });

      allTargets.forEach(target => {
        target.addEventListener("targetFound", () => {
          activeTarget = target;
          updateContent(false); // この中で自動再生が走ります
          
          if (isUnlocked) {
            const isLive = currentMode === 'live';
            const activePlane = target.querySelector(isLive ? '.ar-screen-video' : '.ar-screen-image');
            playRandomAnimation(activePlane);
          }
        });

        target.addEventListener("targetLost", () => {
          const videoId = target.getAttribute('data-video');
          const videoAsset = document.getElementById(videoId);
          if (videoAsset) videoAsset.pause();
          
          if (activeTarget === target) {
            activeTarget = null;
          }
        });
      });

    });
  </script>
</body>
</html>
